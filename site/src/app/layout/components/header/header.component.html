<!--Header Wrapper-->  
<div 
    class="app-header-wrapper" 
    [ngClass]="appHeaderDefaultContainerClass"
    [ngClass]="{'container-xxl': appHeaderDefaultContainer === 'fixed', 'container-fluid': appHeaderDefaultContainer === 'fluid'}">
    <div class="app-header-container d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0">
            <a [routerLink]="['/']" data-cursor="show exclusion">
                <svg-icon [src]="'./assets/logos/default.svg'" class="svg-icon"></svg-icon>                           
            </a>            
        </div>
        <div class="d-flex align-items-stretch justify-content-end flex-lg-grow-1">    
            <!--Menu wrapper-->
            <div class="app-header-menu d-flex align-items-center">
                <div class="
                    menu
                    menu-row
                    align-items-stretch
                    my-5 my-lg-0 px-0 fs-7">
                    <div class="menu-item me-4 me-lg-6">
                        <a class="menu-link without-sub link px-0" [routerLink]="['/servicos']" [routerLinkActive]="'active'">
                            <span class="menu-title">
                                serviços
                            </span>
                        </a>
                    </div>   
                    <div class="menu-item me-4 me-lg-6">
                        <a class="menu-link without-sub link px-0" [routerLink]="['/escritorio']" [routerLinkActive]="'active'">
                            <span class="menu-title">
                                escritório
                            </span>
                        </a>
                    </div>  
                    <div class="menu-item me-4 me-lg-6">
                        <a class="menu-link without-sub link px-0" [routerLink]="['/contato']" [routerLinkActive]="'active'">
                            <span class="menu-title">
                                contato
                            </span>
                        </a>
                    </div>                                            
                </div>
            </div>
        </div>  
        <div class="d-flex align-items-stretch text-end">
            <div class="app-header-button d-flex flex-wrap align-items-center ms-0">
                <button [routerLink]="['/contato']" class="btn btn-sm btn-secondary btn-outline btn-active-outline-primary btn-active-white btn-motion btn-active-motion-primary" aria-label="Contato">
                    <span class="btn-title">
                        <span title="Fale com a gente">Fale com a gente</span>
                    </span> 
                    <span class="btn-motion-ripple"><span></span></span>
                </button>                  
            </div>
        </div>      
        <div class="d-flex align-items-center text-end">
            <div class="d-flex flex-wrap align-items-center my-4 my-lg-0 ms-5 ms-lg-10">               
                <div class="d-flex align-items-stretch flex-shrink-0 cursor-pointer" data-toggle="true">  
                    <span class="text-uppercase fs-9 fw-normal ls-1 me-4">Menu</span>
                    <div 
                        class="btn btn-icon burger-icon" data-cursor="toggle exclusion stick" data-cursor-stick>
                        <span></span>
                        <span></span>
                    </div>   
                </div>     
            </div>          
        </div>               
    </div>
</div>
