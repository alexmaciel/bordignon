                                <h1 class="fs-4x fw-bold text-white">
                                    {{ services.name }}
                                </h1> 
                            </div>
                        }
                    </div>
                </div>

                <div class="service-desc">

                        <div class="col-lg-3 col-xl-3 my-2">        
                            <span class="fs-5 ls-2 text-muted text-uppercase">
                                Descrição
                            </span>
                        </div>  
                        <div class="col-lg-9 col-xl-8">  
                            @if(services) {

                                </div>
