<div class="row mb-8">
    <div class="col-lg-4 col-xl-3">
        <h1 class="fs-1 fw-bold text-primary">
            Nossos Serviços             
        </h1>    
    </div>             
</div>
<div class="row">
    @for (service of services.items$ | async; track service.id) {
        <div class="col-12">
            <div 
                [routerLink]="['/servicos', service.slug]"
                class="card card-hover card-bordered border-left-0 border-right-0 border-bottom-0 rounded-0 cursor-pointer">
                <div class="card-body">
                    <div class="row align-lg-items-center justify-content-between g-0">
                        <div class="col-md-8">
                            <div class="d-flex flex-column flex-lg-row align-items-start"> 
                                <div class="w-75 mb-4 mb-lg-0 pe-lg-14">
                                    <h2 class="fs-2 fw-normal card-body-title">
                                        {{ service.name }}             
                                    </h2>    
                                </div>
                                <div class="w-100">
                                    <div class="fs-normal" [innerHTML]="service.description | truncatetext:100 | safe:'html'"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 d-none d-lg-block">
                            <div class="card-hover-transform">
                                <div class="card-hover-opacity text-end">
                                    <svg-icon [src]="'./assets/images/arrow-up.svg'" class="svg-icon svg-icon-4tx svg-icon-white"></svg-icon>                                                   
                                </div>
                            </div>                    
                        </div>            
                    </div>   
                </div>
            </div>        
        </div>
    }
</div>
