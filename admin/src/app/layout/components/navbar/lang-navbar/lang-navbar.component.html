<!--Menu toggle -->
<div class="btn btn-icon" [ngClass]="toggleBtnClass" data-kt-menu-trigger="{default: 'click', lg: 'hover'}"
  data-kt-menu-attach="parent" data-kt-menu-placement="bottom-end">
    <div class="cursor-pointer symbol symbol-primary symbol-35px symbol-md-40px">
        <ng-container *ngIf="getLang">
            <span class="">
                <img [src]="getFlag?.flag" [alt]="getLang.name" class="w-20px h-20px rounded-1" />
            </span>
        </ng-container>
    </div>  
</div>
<!--Menu -->
<div
    class='menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-title-gray-700 menu-icon-muted menu-active-bg menu-state-primary fw-semibold py-4 fs-base w-175px'
    data-kt-menu='true'>
    <!--Menu item  -->
    <div class='menu-item px-3 my-0'>
        <form [formGroup]="formGroup">
            @for(lang of (languageService.language$ | async); track lang.name) {
                <span>
                    <input 
                        type="radio"
                        formControlName="active_language"
                        [value]="lang.language" 
                        [id]="lang.language"
                        class="btn-check"
                    />
                    <label 
                        class="menu-link d-flex flex-stack text-start p-6"
                        [ngClass]="{'active': currentLang === lang.language}"
                        [for]="lang.language">
                        <div class="d-flex align-items-center me-2">
                            <span class="symbol symbol-20px me-4">
                                <img class="rounded-1" [src]="lang.flag" [alt]="lang.name" />
                            </span>
                            <ng-container *ngIf="lang.language === 'portuguese'">{{ 'lang.portuguese' | translate }}</ng-container>
                            <ng-container *ngIf="lang.language === 'english'">{{ 'lang.english' | translate }}</ng-container>
                            <ng-container *ngIf="lang.language === 'spanish'">{{ 'lang.spanish' | translate }}</ng-container>                                                                                    
                        </div>
                    </label>                    
                </span>
            }
        </form>
    </div>    
</div>
