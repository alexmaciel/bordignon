<div class="card mb-5 mb-xl-8">
    <div class="card-header border-0 pt-5">
        <div class="card-title">
            <h3 class="card-label fw-bolder fs-3 mb-1">{{'title.infoHeadTitle' | translate }}</h3>
        </div>
        <div class="card-toolbar">
            <button
                type="button"
                class="btn btn-primary fw-bolder"
                (click)="create()">
                <span
                    [inlineSVG]="'./assets/media/icons/duotune/abstract/abs053.svg'"
                    class="svg-icon svg-icon-3">
                </span>          
                {{ 'btn.addBtn' | translate }}
            </button>
        </div>
    </div>
    <div 
        class="card-body cursor-default" 
        [ngClass]="{'overlay overlay-block': isLoading}">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-dark bg-opacity-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>            
        </ng-container>         
        <div class="table-responsive angular-bootstrap-table">
            <table class="table table-head-custom table-row-dashed table-row-gray-300 align-middle gs-0 gy-3 draggable">
                <thead>
                    <tr class="fw-bolder text-muted">
                        <th>
                            {{ 'table.tab_name' | translate }}
                            <app-sort-icon
                                column="name"
                                [activeColumn]="sorting.column"
                                [activeDirection]="sorting.direction"
                                (sort)="sort($event)">
                            </app-sort-icon>                            
                        </th>   
                        <th>{{ 'table.tab_description' | translate }}</th> 
                        <th>{{ 'table.tab_createdBy' | translate }}</th> 
                        <th>{{ 'table.tab_dateCreated' | translate }}</th>                             
                        <th class="text-end"></th>   
                    </tr>                 
                </thead>
                <tbody 
                    cdkDropList
                    #doneList="cdkDropList"
                    [cdkDropListData]="items.items$ | async"
                    (cdkDropListDropped)="drop($event)">
                    <tr *ngFor="let item of items.items$ | async;  index as i" cdkDrag>
                        <td>
                            <div class="d-flex align-items-center">								
                                <div class="symbol symbol-25px me-5 symbol-circle">
                                    <span 
                                        class="symbol-label text-primary fw-bold font-size-h4"
                                        *ngIf="item.file_name === ''">
                                        {{ i+1 }}
                                    </span>				
                                    <span class="symbol-label bg-white" *ngIf="item.file_name" [style.backgroundImage]="'url('+ item.folder + '/' + item.file_name +')'"></span>
                                </div>								
                                <div class="d-flex justify-content-start flex-column">									
                                    <div class="fw-bolder text-hover-primary fs-6">
                                        {{ item.name }}
                                    </div>									
                                    <a class="text-muted fw-bold text-muted d-block fs-7"></a>
                                </div>
                            </div>                       
                        </td>              
                        <td><div [innerHTML]="item.description | truncatetext:50 | safe:'html'"></div></td>
                        <td><div class="fw-bold text-muted">{{ item.staff?.fullname }}</div></td>
                        <td><div class="fw-bolder text-primary mb-0">{{ item.date | datelocale }}</div></td> 
                        <td>
                            <div class="d-flex justify-content-end flex-shrink-0">                                          
                                <a
                                    title="Edit"
                                    class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm me-2"
                                    (click)="edit(item.id)">
                                    <span
                                        [inlineSVG]="'./assets/media/icons/duotune/art/art005.svg'"
                                        class="svg-icon svg-icon-3">
                                    </span>
                                </a>
                                <a
                                    title="Delete"
                                    class="btn btn-icon btn-bg-light btn-active-color-danger btn-sm"
                                    (click)="delete(item.id)">
                                    <span
                                        [inlineSVG]="'./assets/media/icons/duotune/general/gen027.svg'"
                                        class="svg-icon svg-icon-3">
                                    </span>
                                </a>
                            </div>
                        </td>               
                    </tr>
                </tbody>                   
            </table>            
        </div>
        <app-paginator
            class="d-flex justify-content-between align-items-center flex-wrap"
            [paginator]="paginator"
            [isLoading]="isLoading"
            (paginate)="paginate($event)">
        </app-paginator>          
    </div>
</div>
