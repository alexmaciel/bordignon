<div #dropListContainer>
    <div 
        cdkDropList
        [cdkDropListData]="teams$ | async"
        [cdkDropListOrientation]="'mixed'"
        (cdkDropListDropped)="dragDropped($event)"
        class="row g-6 g-xl-8">
        @for(team of (teams$ | async); track team.id; let i = $index) {
            <div
                cdkDrag
                [cdkDragData]="i"
                (cdkDragEntered)="dragEntered($event)"
                (cdkDragMoved)="dragMoved($event)"            
                class="col-md-6 col-lg-4 col-xxl-3">
                <div 
                    class="card card-stretch">
                    <div class="card-header d-flex justify-content-end border-0">
                        <div class="card-toolbar m-0">
                            <div 
                                class="dropdown dropdown-inline" ngbDropdown 
                                container="body">
                                <button type="button" class="btn btn-icon btn-active-color-primary btn-sm ms-3" ngbDropdownToggle>
                                    <i class="fa-solid fa-ellipsis-v fs-3"></i>
                                </button>            
                                <div class="menu menu-sub menu-sub-dropdown w-150px py-4" ngbDropdownMenu>
                                    <div class="menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-bold fs-6">
                                        <!--Menu item-->
                                        <div class="menu-item px-3">
                                            <a 
                                                class="menu-link px-3 cursor-pointer"
                                                [routerLink]="['edit', team.id] | localize">
                                                {{ 'btn.editBtn' | translate }}
                                            </a>
                                        </div>
                                        <!--Menu item-->
                                        <div class="menu-item px-3">
                                            <a 
                                                class="menu-link px-3 text-danger bg-hover-light-danger cursor-pointer" 
                                                (click)="delete(team.id)">
                                                {{ 'btn.deleteBtn' | translate }}
                                            </a>
                                        </div>                                
                                    </div>                                       
                                </div>
                            </div>                         
                        </div>
                    </div>
                    <div class="card-body d-flex flex-center flex-column pt-0 p-9">
                        <div class="symbol symbol-150px symbol-circle overflow-hidden mb-5">
                            <ng-container *ngIf="team.file_avatar">
                                <img 
                                    style="object-fit: cover;" 
                                    [src]="getAvatar(team.folder, team.file_avatar)" 
                                    [alt]="team.name" 
                                />
                            </ng-container>
                            <ng-container *ngIf="!team.file_avatar">
                                <img style="object-fit: cover;" src="./assets/media/avatars/blank.png" />
                            </ng-container>
                        </div>
                        <div class="fs-4 text-gray-800 text-hover-primary fw-bold mb-0">
                            {{ team.name }}
                        </div>
                        <div class="fw-semibold text-gray-400 mb-3">
                            <p [innerHTML]="team.employer"></p>
                        </div>                       
                    </div>
                </div>
            </div>
        }
    </div>
</div>
<app-paginator
    class="d-flex flex-stack flex-wrap pt-10"
    [paginator]="paginator"
    [isLoading]="isLoading"
    (paginate)="paginate($event)">
</app-paginator>
