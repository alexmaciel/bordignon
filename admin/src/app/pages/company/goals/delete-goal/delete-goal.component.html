<div class="modal-header">
    <div class="modal-title h4">{{ 'title.deleteTitle' | translate }}</div>
    <div class="d-flex ml-2">
      <button 
          class="btn btn-icon btn-sm btn-active-light-primary ms-2" data-bs-dismiss="modal" aria-label="Close" 
          data-dismiss="modal" 
          (click)="modal.close()">
          <span
              [inlineSVG]="'./assets/media/icons/duotune/arrows/arr061.svg'"
              class="svg-icon svg-icon-2x">
          </span>
      </button>
    </div>    
  </div>
  <div class="modal-body overlay overlay-block">
    <ng-container *ngIf="isLoading">
      <div class="overlay-layer bg-dark bg-opacity-5">
          <div class="spinner spinner-lg spinner-success"></div>
      </div>
  </ng-container>    
    <ng-container *ngIf="isLoading">
      <span>{{ 'title.deletingInfo' | translate }}</span>
    </ng-container>
  
    <ng-container *ngIf="!isLoading">
      <span>{{ 'form.deletePropertyConf' | translate }}</span>
    </ng-container>
  </div>
  
  <div class="modal-footer">
    <div>
      <button type="button" class="btn btn-light btn-elevate fw-bolder me-1" (click)="modal.dismiss()">
        {{ 'btn.cancelBtn' | translate }}
      </button>&nbsp;
      <button type="button" class="btn btn-light-danger btn-elevate fw-bolder" (click)="deleteGoal()">
        {{ 'btn.deleteBtn' | translate }}
      </button>
    </div>
  </div>
