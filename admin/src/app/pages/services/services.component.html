<div class="card mb-5 mb-xl-10"> 
    <div class="card-body pt-9 pb-0">
        <div class="d-flex overflow-auto h-55px">
            <ul
                class="
                nav nav-stretch nav-line-tabs nav-line-tabs-2x
                border-transparent
                fs-5
                fw-bolder
                flex-nowrap">
                <li class="nav-item">
                    <a
                        class="nav-link text-active-primary me-6"
                        [routerLink]="['/services/overview'] | localize"
                        [ngClass]="calculateMenuItemCssClass('/services/overview')">
                        {{ 'title.overviewTitle' | translate }}
                    </a>
                </li> 
                <li class="nav-item">
                    <a
                        class="nav-link text-active-primary me-6"
                        [routerLink]="['/services/list'] | localize"
                        [ngClass]="calculateMenuItemCssClass('/services/list')">
                        {{ 'nav.servicesNav' | translate }}
                    </a>
                </li>                                  
            </ul>
        </div>        
    </div>
</div>
<router-outlet></router-outlet>
