<div class="px-7 py-5">
    <div class="fs-5 text-gray-900 fw-bolder">Filter Options</div>
</div>
<div class="separator border-gray-200"></div>
<div class="px-7 py-5">
    <div class="mb-10">
        <div class="menu-content px-3 mb-3">
            <label class="form-label fw-bold d-flex justify-content-between">
                <span>
                    Temperature 
                    <i
                        class="fas fa-exclamation-circle ms-1 fs-7"
                        [ngbTooltip]="'Controls randomness: lowering results in less random completions. As the temperature approaches zero, the model will become deterministic and repetitive.'"
                        container="body"
                        placement="start">
                    </i>                        
                </span>
                <span class="text-muted">{{ temperature | number : '1.2-2' }}</span>
            </label>            
        </div>
        <div class="menu-item px-3">
            <input
                type="range"
                class="form-range"
                name="temperature"
                [min]="0"
                [max]="2"
                [step]="0.05"
                [(ngModel)]="temperature"
                (ngModelChange)="onTemperatureChange($event)"
            />            
        </div>
        <div class="menu-content px-3 mb-3">
            <label class="form-label fw-bold d-flex justify-content-between">
                <span>
                    Max Completion Tokens 
                    <i
                        class="fas fa-exclamation-circle ms-1 fs-7"
                        [ngbTooltip]="'The model can generate up to 131072 tokens, and can use up to 131072 tokens shared between prompt and completion. Maximum output tokens is limited to 8k'"
                        container="body"
                        placement="start">
                    </i>                        
                </span>
                <span class="text-muted">{{ maxTokens }}</span>
            </label>            
        </div>
        <div class="menu-item px-3">
            <input
                type="range"
                class="form-range"
                name="maxTokens"
                [min]="16"
                [max]="4096"
                [step]="16"
                [(ngModel)]="maxTokens"
                (ngModelChange)="onMaxTokensChange($event)"
            />            
        </div>  
        <div class="menu-content px-3 mb-3">
            <label class="form-label fw-bold d-flex justify-content-between">
                <span>
                    Top P 
                    <i
                        class="fas fa-exclamation-circle ms-1 fs-7"
                        [ngbTooltip]="'Controls diversity via nucleus sampling: 0.5 means half of all likelihood-weighted options are considered.'"
                        container="body"
                        placement="start">
                    </i>                        
                </span>
                <span class="text-muted">{{ topP | number : '1.2-2' }}</span>
            </label>            
        </div>
        <div class="menu-item px-3">
            <input
                type="range"
                class="form-range"
                name="topP"
                [min]="0"
                [max]="1"
                [step]="0.01"
                [(ngModel)]="topP"
                (ngModelChange)="onTopPChange($event)"
            />  
        </div>              
        <div class="menu-content px-3 mb-3">
            <label class="form-label fw-bold">Image presets:</label>
        </div>
        <ng-container *ngFor="let preset of basePresets">
            <div class="menu-item px-3">
                <a
                    class="menu-link px-3 cursor-pointer d-flex align-items-center justify-content-between"
                    [ngClass]="{ 'active': isActivePreset(preset) }">
                    <span class="menu-title">
                        {{ preset.label }}
                    </span>
                    <span>
                        <div class="d-flex justify-content-end">
                            <div class="form-check form-switch form-check-custom form-check-light form-check-solid">
                                <input
                                    type="checkbox"
                                    class="form-check-input w-20px h-15px"
                                    [checked]="isActivePreset(preset)"
                                    (change)="onSelectPreset(preset)"
                                />
                                <label
                                    class="form-check-label"
                                    [attr.for]="'preset-' + preset.id">
                                </label>                                
                            </div>	
                        </div>	                        
                    </span>
                </a>
            </div>
        </ng-container>

            <div class="menu-content px-3 pt-0">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="text-muted fs-8">

                    </span>

                </div>
    
                <input

                <div class="d-flex justify-content-between mt-1 text-muted fs-9">
                    <span>{{ sizeSteps[0].label }}</span>
                    <span>{{ sizeSteps[maxSizeIndex].label }}</span>
                </div>
            </div> 
        -->
    </div>
</div>
