<div class="row g-5 g-xl-10 mb-5 mb-xl-10">
    <div class="col-lg-4">
        <div class="card card-flush bgi-no-repeat bgi-size-contain bgi-position-x-end h-lg-100" style="background-color: #7239EA;background-image:url('./assets/media/svg/wave-bg-purple.svg')">
            <!--Header-->
            <div class="card-header py-10 mb-3">
                <!--Icon-->
                <div class="d-flex flex-center rounded-circle h-80px w-80px" style="border: 1px dashed rgba(255, 255, 255, 0.4);background-color: #7239EA">
                    <i class="fas fa-users text-white fs-2qx lh-0"></i>
                </div>
            </div>
            <!--Card body-->
            <div class="card-body d-flex align-items-end mb-3">
                <!--Info-->
                <ng-container *ngIf="overview.items$ | async as result">
                    <div class="d-flex flex-column">
                        <ng-container *ngIf="result['clients_status_stats'] as client">
                            <div class="d-flex align-items-start flex-column">
                                <span class="fs-4x text-white fw-bold mb-0">{{ client['total'] }}</span>
                                <div class="fw-bold fs-6 text-white">
                                    <span class="d-block">{{ 'crm.crmClients' | translate }}</span>
                                    <span class="">{{ 'crm.crmActive' | translate }}</span>
                                </div>
                            </div>
                        </ng-container>
                        <ng-container *ngIf="result['leads_status_stats'] as lead">
                            <div class="d-flex align-items-start flex-column">
                                <span class="fs-4x text-white fw-bold mb-0">{{ lead['total'] }}</span>
                                <div class="fw-bold fs-6 text-white">
                                    <span class="d-block">{{ 'crm.crmLeads' | translate }}</span>
                                    <span class="">{{ 'crm.crmActive' | translate }}</span>
                                </div>
                            </div>
                        </ng-container>                    
                    </div>
                </ng-container>
            </div>
            <!--Card footer-->
            <ng-container *ngIf="overview.items$ | async as result">
                <!--Progress
                    <div class="card-footer" style="border-top: 1px solid rgba(255, 255, 255, 0.3);background: rgba(0, 0, 0, 0.15);">
                    <div class="fw-bold text-white py-2">
                        <span class="fs-1 d-block"></span>
                        <span class="opacity-50">{{ 'crm.crmTotal' | translate }}</span>
                    </div>
                </div>
                -->
            </ng-container>
        </div>        
    </div>
    <div class="col-lg-8">
        <div class="card card-flush overflow-hidden h-lg-100">
            <!--Card body-->
            <div class="card-body p-0">
                <!--Wrapper-->
                <div class="card-px text-center py-20 my-10">
                    <!--Title-->
                    <h2 class="fs-2x fw-bold mb-10">{{ 'crm.crmWelcome' | translate }}</h2>
                    <!--Description-->
                    <p class="text-gray-400 fs-4 fw-semibold mb-10" [innerHTML]="'crm.crmQuip' | translate"></p>
                </div>
                <!--Illustration-->
                <div class="text-center px-4">
                    <img class="mw-100 mh-300px" [alt]="'btn.crmTitle' | translate" src="./assets/media/illustrations/sigma/2.png">
                </div>
            </div>
        </div>        
    </div>
</div>
