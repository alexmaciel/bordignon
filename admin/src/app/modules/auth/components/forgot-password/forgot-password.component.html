<form
  class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework"
  novalidate="novalidate"
  [formGroup]="forgotPasswordForm"
  (ngSubmit)="submit()"
  id="kt_login_password_reset_form">
  <!--Heading-->
  <div class="text-center mb-10">
    <!--Title-->
    <h1 class="text-gray-900 fw-bolder mb-3">
      {{ 'login.forgotPassword' | translate }}
    </h1>
    <!--Link-->
    <div class="text-gray-500 fw-semibold fs-6">
      {{ 'login.forgotInstructions' | translate }}
    </div>
  </div>
  <!--Heading-->

  <!-- Alert error-->
  <ng-container *ngIf="errorState === errorStates.HasError">
    <div class="mb-lg-15 alert alert-danger">
      <div class="alert-text fw-bold">
        Sorry, looks like there are some errors detected, please try again.
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="errorState === errorStates.NoError">
    <div class="mb-10 bg-light-info p-8 rounded">
      <!--Body-->
      <div class="text-info">Sent password reset. Please check your email</div>
    </div>
  </ng-container>

  <!--Form group-->
  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Email</label>
    <div class="input-group input-group-lg">
      <input
        class="form-control h-auto py-7 px-6 rounded-lg"
        type="email"
        formControlName="email"
        placeholder="Email"
        name="email"
        autocomplete="off"
        [ngClass]="{
          'is-invalid': forgotPasswordForm.controls['email'].invalid,
          'is-valid': forgotPasswordForm.controls['email'].valid
        }"
      />
      <span class="input-group-text">
        <i class="fa fa-envelope fs-3"></i>
      </span>       
    </div>

    <ng-container
      [ngTemplateOutlet]="formError"
      [ngTemplateOutletContext]="{
        validation: 'required',
        message: 'form.propertyReq' | translate,
        control: forgotPasswordForm.controls['email']
      }"
    ></ng-container>
    <ng-container
      [ngTemplateOutlet]="formError"
      [ngTemplateOutletContext]="{
        validation: 'email',
        message: 'form.adminEmailReq' | translate,
        control: forgotPasswordForm.controls['email']
      }"
    ></ng-container>
    <ng-container
      [ngTemplateOutlet]="formError"
      [ngTemplateOutletContext]="{
        validation: 'minLength',
        message: 'form.propertyMinimumReq' | translate:{min: '3'},
        control: forgotPasswordForm.controls['email']
      }"
    ></ng-container>
    <ng-container
      [ngTemplateOutlet]="formError"
      [ngTemplateOutletContext]="{
        validation: 'maxLength',
        message: 'form.propertyMaximumReq' | translate:{max: '100'},
        control: forgotPasswordForm.controls['email']
      }"
    ></ng-container>
  </div>

  <!--Form group-->
  <div class="d-flex flex-wrap justify-content-center pb-lg-0">
    <button
      type="submit"
      id="kt_password_reset_submit"
      class="btn btn-primary fw-bolder fs-h6 px-8 py-4 my-3 me-4">
      <span class="indicator-label">
        {{ 'btn.resetPasswordBtn' | translate }}
      </span>
      <ng-container *ngIf="isLoading$ | async">
        <span class="indicator-progress">
          Please wait...
          <span
            class="spinner-border spinner-border-sm align-middle ms-2"
          ></span>
        </span>
      </ng-container>
    </button>
    <a
      routerLink="/auth/login"
      id="kt_login_password_reset_form_cancel_button"
      class="btn btn-light fw-bolder fs-h6 px-8 py-4 my-3">
      {{ 'btn.cancelBtn' | translate }}
    </a>
  </div>

</form>


<ng-template
  #formError
  let-control="control"
  let-message="message"
  let-validation="validation">
  <ng-container
    *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <div class="fv-help-block">
        <span role="alert">{{ message }}</span>
      </div>
    </div>
  </ng-container>
</ng-template>
