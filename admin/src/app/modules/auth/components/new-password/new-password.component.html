<form
	class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework"
	novalidate="novalidate"
	[formGroup]="newPasswordForm"
	(ngSubmit)="submit()"
	id="kt_new_password_form"
	[ngStyle]="{
		display: errorState === errorStates.NoError ? 'none' : 'block'
	}">
	<!--Heading-->
	<div class="text-center mb-10">
		<!--Title-->
		<h1 class="text-gray-900 fw-bolder mb-3">
			{{ 'login.resetPassword' | translate }}
		</h1>
		<!--Link-->
		<div class="text-gray-500 fw-semibold fs-6">
			{{ 'login.resetInstructions' | translate }}
			<a [routerLink]="['/auth/login']" class="link-primary fw-bold cursor-pointer">
				{{ 'btn.signInBtn' | translate }}
			</a>			
		</div>
	</div>
	<!--Heading-->

	<!-- Alert error-->
	<ng-container *ngIf="errorState === errorStates.HasError">
		<div class="mb-lg-15 alert alert-danger">
		<div class="alert-text fw-bold">
			Sorry, looks like there are some errors detected, please try again.
		</div>
		</div>
	</ng-container>

	<ng-container *ngIf="errorState === errorStates.NoError">
		<div class="mb-10 bg-light-info p-8 rounded">
		<!--Body-->
		<div class="text-info">Sent password reset. Please check your email</div>
		</div>
	</ng-container>

	<div class="fv-row mb-8">
		<label class="form-label fw-bolder text-gray-900 fs-6">
			{{ 'form.newPassField' | translate }}
		</label>
		<div class="input-group input-group-lg">
			<input 
				class="form-control h-auto py-7 px-6 rounded-lg" 
				[type]="'text'" 
				[placeholder]="'form.newPassField' | translate" 
				name="currentPassword"
				formControlName="currentPassword" 
				autocomplete="off" 
				readonly
			/>
			<span class="input-group-text cursor-pointer" (click)='showHidePassword()'>
				<i class="fa fs-3 fa-lock"></i>
			</span>				
		</div>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'required',
			message: 'form.propertyReq' | translate,
			control: newPasswordForm.controls['currentPassword']
		}"></ng-container>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'minlength',
			message: 'form.propertyMinimumReq' | translate:{min: '3'},
			control: newPasswordForm.controls['currentPassword']
		}"></ng-container>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'maxLength',
			message: 'form.propertyMaximumReq' | translate:{max: '100'},
			control: newPasswordForm.controls['currentPassword']
		}"></ng-container>
	</div>
	<div class="fv-row mb-8">
		<label class="form-label fw-bolder text-gray-900 fs-6">
			{{ 'form.passwordField' | translate }}
		</label>
		<div class="input-group input-group-lg">
			<input 
				class="form-control h-auto py-7 px-6 rounded-lg" 
				[type]="showPassword ? 'text' : 'password'" 
				[placeholder]="'form.passwordField' | translate" 
				name="password"
				formControlName="password" 
				autocomplete="off" 
				[ngClass]="{
					'is-invalid': newPasswordForm.controls['password'].invalid,
					'is-valid': newPasswordForm.controls['password'].valid
				}" />
			<span class="input-group-text cursor-pointer" (click)='showHidePassword()'>
				<i class="fa fs-3" [ngClass]="!showPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
			</span>				
		</div>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'required',
			message: 'form.propertyReq' | translate,
			control: newPasswordForm.controls['password']
		}"></ng-container>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'minlength',
			message: 'form.propertyMinimumReq' | translate:{min: '3'},
			control: newPasswordForm.controls['password']
		}"></ng-container>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'maxLength',
			message: 'form.propertyMaximumReq' | translate:{max: '100'},
			control: newPasswordForm.controls['password']
		}"></ng-container>
	</div>	
	<div class="fv-row mb-8">
		<label class="form-label fw-bolder text-gray-900 fs-6">
			{{ 'form.confirmNewPassField' | translate }}
		</label>
		<div class="input-group input-group-lg">
			<input 
				class="form-control h-auto py-7 px-6 rounded-lg" 
				[type]="showPassword ? 'text' : 'password'" 
				[placeholder]="'form.confirmNewPassField' | translate" 
				name="cPassword"
				formControlName="cPassword" 
				autocomplete="off" 
				[ngClass]="{
					'is-invalid': newPasswordForm.controls['cPassword'].invalid,
					'is-valid': newPasswordForm.controls['cPassword'].valid
				}" />
			<span class="input-group-text cursor-pointer" (click)='showHidePassword()'>
				<i class="fa fs-3" [ngClass]="!showPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
			</span>				
		</div>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'required',
			message: 'form.propertyReq' | translate,
			control: newPasswordForm.controls['cPassword']
		}"></ng-container>
		<ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
			validation: 'ConfirmPassword',
			message: 'profile.newPassMatchReqVal' | translate,
			control: newPasswordForm.controls['cPassword']
		}"></ng-container> 
	</div>		

  <!--Form group-->
  <div class="d-flex flex-wrap justify-content-center pb-lg-0">
    <button
      type="submit"
      id="kt_new_password_submit"
      class="btn btn-primary fw-bolder fs-h6 px-8 py-4 my-3 me-4">
      <span class="indicator-label">
        {{ 'btn.resetPasswordBtn' | translate }}
      </span>
      <ng-container *ngIf="isLoading$ | async">
        <span class="indicator-progress">
          Please wait...
          <span
            class="spinner-border spinner-border-sm align-middle ms-2"
          ></span>
        </span>
      </ng-container>
    </button>
    <a
      routerLink="/auth/login"
      id="kt_login_password_reset_form_cancel_button"
      class="btn btn-light fw-bolder fs-h6 px-8 py-4 my-3">
      {{ 'btn.cancelBtn' | translate }}
    </a>
  </div>	
</form>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <div class="fv-help-block">
        <span role="alert">
          {{ message }}
        </span>
      </div>
    </div>
  </ng-container>
</ng-template>
